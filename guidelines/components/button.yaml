props:
  semantic:
    variant: [primary, secondary, tertiary, neutral, hyperlink, underlined]
    size: [xs, sm, md, lg]
    state: [default, hovered, pressed, disabled]

  figma:
    - name: variant
      type: enum
      values: [primary, secondary, tertiary, neutral, hyperlink, underlined]

    - name: size
      type: enum
      values: [xs, sm, md, lg]

    - name: isOnBackground
      type: string_boolean       # NOT a real boolean — pass as quoted string
      values: ["False", "True"]

    - name: isDisabled
      type: string_boolean       # NOT a real boolean — pass as quoted string
      values: ["false", "true"]

    - name: isHovered
      type: boolean
      values: [true, false]

    - name: isPressed
      type: boolean
      values: [true, false]

    - name: isSplit
      type: boolean
      values: [true, false]

    - name: hasLeadingIcon
      type: boolean
      values: [true, false]

    - name: hasTrailingIcon
      type: boolean
      values: [true, false]

    - name: hasLabel                  # absent on primary variant
      type: boolean
      values: [true, false]
      applies_to: [secondary, tertiary, neutral, hyperlink, underlined]

overrides:
  text:
    - layer_name: Label
      required_when: hasLabel=true

  instance_swap:
    - layer_name: L icon
      accepts: Icon
      required_when: hasLeadingIcon=true
    - layer_name: T icon
      accepts: Icon
      required_when: hasTrailingIcon=true

  visibility:
    - layer_name: Trailing separator
      controlled_by: isSplit

usage:
  primary:
    intent: |
      Reserved for the single most important action of the entire page —
      typically the product's core CTA. One primary per page, never two.
      Use it for the action the page exists to drive: a transactional
      commit or a conversion event. Not a generic "default action" colour.
    when_to_use:
      - product-level core CTA — the action the page exists to drive
      - transactional commit where intent converts to outcome
      - search submission on a search-driven surface
    examples:
      - "Search" on a search / discovery page
      - "Pay now" on checkout / payment
      - "Book now" on a booking flow
      - "Confirm and pay" on order review
    do_not_use_for:
      - secondary or supporting actions on the same page
      - destructive actions (use a confirm dialog or neutral)
      - navigation between sections or tabs
      - repeated row actions inside lists, cards, or tables
      - any action that is not the page's single most important CTA

  secondary:
    intent: |
      Page-level primary action. Important to the current page or flow,
      but not a core product CTA. Used for actions that progress, save,
      or complete work on the page.
    when_to_use:
      - page-level primary action that is not the product's core CTA
      - flow progression actions (Done, Continue, Next, Save, Submit, Apply)
      - dialog / modal confirm action that is not the product CTA
      - prominent action when no product-level primary is on the page
    examples:
      - "Done" on a settings or filter sheet
      - "Continue" / "Next" in a multi-step flow
      - "Save" on a form
      - "Apply" on a filter panel
    do_not_use_for:
      - product-level core CTA (use primary)
      - cancel / dismiss / back action paired with secondary (use tertiary ghost)

  tertiary:
    intent: |
      Low-emphasis bordered ghost action. Tertiary-level — used for
      actions that are alternates to a primary or secondary, or for
      lower-importance actions that still need to be highly accessible
      and discoverable. Two roles:
        1. Standalone alternate action — discoverable but de-emphasised,
           typically inside cards, carousels, list surfaces.
        2. Ghost pair partner — every filled button (primary or
           secondary) is paired with a tertiary ghost for cancel / back /
           dismiss.
    when_to_use:
      - low-importance alternate action that still needs to be highly accessible
      - "view more" / "learn more" / "see more" inside cards or card carousels
      - cancel / dismiss / back paired with a filled primary or secondary
      - third action in dense action rows
      - action inside cards or modals where filled weight would compete with card content
    examples:
      - "View more" inside a content card
      - "Learn more" on a feature card
      - "See more" on the last slide of a card carousel
      - "Cancel" paired with "Save"
      - "Back" paired with "Continue"
      - "Discard" paired with "Done"

  neutral:
    intent: achromatic action with no brand colour
    when_to_use:
      - utility actions in chrome (toolbars, filters, dropdowns)
      - dark or branded surfaces where brand colour would clash

  hyperlink:
    intent: inline text link, no underline
    when_to_use:
      - inline within paragraph text or table cells
      - "see all" / "view more" anchors that navigate elsewhere

  underlined:
    intent: inline text link with underline
    when_to_use:
      - text link that needs stronger affordance inside dense copy
      - terms, privacy, footer links

decision_tree:
  variant:
    - { condition: "single product-level CTA on the whole page (search, pay now, book now)", use: primary }
    - { condition: "page-level primary action — flow progression or page commit (done, continue, next, save)", use: secondary }
    - { condition: "tertiary-level alternate action (view more, learn more, see more inside cards / carousels) OR ghost partner for a filled button (cancel, back, dismiss)", use: tertiary }
    - { condition: "achromatic action, no brand colour", use: neutral }
    - { condition: "inline text link, no underline", use: hyperlink }
    - { condition: "inline text link with underline", use: underlined }

  size:
    - { condition: "default UI, most surfaces", use: md }
    - { condition: "compact or dense layout", use: sm }
    - { condition: "hero CTA, landing page", use: lg }
    - { condition: "tight space, tag or pill context", use: xs }

composition:
  parent_rules:
    - do not place inside List Cell — use List Cell's built-in action slots instead
    - avoid size lg inside cards, modals, or list surfaces
  child_rules:
    - icon instances in L icon / T icon must match size context — 16px for xs/sm/md, 24px for lg
  spacing:
    sibling_gap_px: 8
  rules:
    - one primary per page — reserved for the product's core CTA (search, pay now, book now); never two primaries on the same page
    - secondary is the page-level primary — use for flow progression or page commit (done, continue, next, save) when the action is not the product's core CTA
    - filled buttons (primary or secondary) are always paired with a tertiary ghost button — never pair two filled buttons together
    - tertiary ghost carries the cancel / back / dismiss role in a filled + ghost pair
    - hyperlink and underlined are inline — do not place in button rows
  see_also: [fab]

layout:
  default_width: hug
  allowed_width_modes: [hug, fill]
  default_height: hug
  responsive_rules:
    - "full-width on mobile: set width mode to fill on the instance"

validation:
  required_props: [variant, size]
  required_overrides:
    - when: "hasLeadingIcon=true"
      override: "L icon instance swap"
    - when: "hasTrailingIcon=true"
      override: "T icon instance swap"
  invalid_combinations:
    - when: { variant: neutral, size: lg }
      reason: "neutral variant has no lg in the component set"

execution_order:
  - choose_variant
  - create_instance
  - set_props
  - apply_overrides
  - validate
